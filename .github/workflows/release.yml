name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version (Kalcor-style letters)
        id: ver
        shell: bash
        run: |
          # 1.0a, 1.0b, ... 1.0z, 1.0aa, 1.0ab, ... — one letter per commit.
          # OFFSET pins the first auto-versioned commit to "a".
          OFFSET=13
          COUNT=$(git rev-list --count HEAD)
          IDX=$((COUNT - OFFSET))
          if [ "$IDX" -lt 1 ]; then IDX=1; fi
          SUFFIX=""
          N=$IDX
          while [ "$N" -gt 0 ]; do
            N=$((N - 1))
            SUFFIX=$(printf "\\$(printf '%03o' $((97 + N % 26)))")$SUFFIX
            N=$((N / 26))
          done
          VERSION="1.0$SUFFIX"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (commit #$COUNT)"

      - name: Stamp version into source
        shell: bash
        run: |
          sed -i "s/const string VERSION  = \"[^\"]*\";/const string VERSION  = \"${{ steps.ver.outputs.version }}\";/" \
            guides/DML-Windows/DML-Launcher.cs
          grep 'const string VERSION' guides/DML-Windows/DML-Launcher.cs

      - name: Compile DC-Launcher.exe
        shell: cmd
        run: |
          "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" ^
            /nologo /optimize+ /target:winexe ^
            /win32icon:guides\DML-Windows\dc-launcher.ico ^
            /reference:System.dll,System.Drawing.dll,System.Windows.Forms.dll,System.Net.dll ^
            /out:DC-Launcher.exe ^
            guides\DML-Windows\DML-Launcher.cs
          if errorlevel 1 exit /b 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          files: DC-Launcher.exe
          generate_release_notes: false
          body: |
            ## v${{ steps.ver.outputs.version }}

            **Download `DC-Launcher.exe` below and run it. That is all.**

            The launcher installs itself, sets up WSL2 + Docker, and walks you through
            installing your WoW WotLK private server — all from one file.

            ### First run
            1. Download `DC-Launcher.exe`
            2. Run it — if SmartScreen appears, click **More info → Run anyway**
            3. Follow the 3-step wizard: base environment → WoW server → done
            4. Tray icon appears when ready

            ### Already installed?
            Running the exe again detects the existing install and offers to update.

            ### Uninstall
            Settings → Apps → DC Launcher → Uninstall

            ### Source
            Compiled from [`guides/DML-Windows/DML-Launcher.cs`](guides/DML-Windows/DML-Launcher.cs)
