name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version (Kalcor system)
        id: ver
        shell: bash
        run: |
          # Base version comes from the VERSION file (e.g. "0.1a" or "0.1b RC").
          # Commits since VERSION last changed become R revisions / RC numbers:
          #   1st build of "0.1a"  -> 0.1a
          #   2nd build            -> 0.1a R2
          #   1st build of "0.1b RC" -> 0.1b RC1 (pre-release)
          BASE=$(tr -d '\r\n' < VERSION)
          LAST_CHANGE=$(git log -1 --format=%H -- VERSION)
          N=$(git rev-list --count "$LAST_CHANGE..HEAD")
          BUILD=$((N + 1))
          PRERELEASE=false
          case "$BASE" in
            *" RC")
              VER="${BASE}${BUILD}"
              PRERELEASE=true
              ;;
            *)
              if [ "$BUILD" -eq 1 ]; then
                VER="$BASE"
              else
                VER="$BASE R$BUILD"
              fi
              ;;
          esac
          TAG="v${VER// /-}"
          echo "version=$VER"        >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"            >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Version: $VER  (tag $TAG, prerelease=$PRERELEASE)"

      - name: Collect changes since last release
        id: changes
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi
          {
            echo "list<<CHANGES_EOF"
            git log --format='- %s' $RANGE | head -30
            echo "CHANGES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stamp version into source
        shell: bash
        run: |
          sed -i "s/const string VERSION  = \"[^\"]*\";/const string VERSION  = \"${{ steps.ver.outputs.version }}\";/" \
            guides/DML-Windows/DML-Launcher.cs
          grep 'const string VERSION' guides/DML-Windows/DML-Launcher.cs

      - name: Compile DC-Launcher.exe
        shell: cmd
        run: |
          "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" ^
            /nologo /optimize+ /target:winexe ^
            /win32icon:guides\DML-Windows\dc-launcher.ico ^
            /reference:System.dll,System.Drawing.dll,System.Windows.Forms.dll,System.Net.dll ^
            /out:DC-Launcher.exe ^
            guides\DML-Windows\DML-Launcher.cs
          if errorlevel 1 exit /b 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.version }}
          prerelease: ${{ steps.ver.outputs.prerelease }}
          files: DC-Launcher.exe
          generate_release_notes: false
          body: |
            ## ${{ steps.ver.outputs.version }}

            ### Changes in this build
            ${{ steps.changes.outputs.list }}

            **Download `DC-Launcher.exe` below and run it. That is all.**

            The launcher installs itself, sets up WSL2 + Docker, and walks you through
            installing your WoW WotLK private server — all from one file.

            ### First run
            1. Download `DC-Launcher.exe`
            2. Run it — if SmartScreen appears, click **More info → Run anyway**
            3. Follow the 3-step wizard: base environment → WoW server → done
            4. Tray icon appears when ready

            ### Already installed?
            Running the exe again detects the existing install and offers to update.

            ### Uninstall
            Settings → Apps → DC Launcher → Uninstall

            ### Versioning
            See [VERSIONING.md](VERSIONING.md) — letter releases, R revisions, RC pre-releases.
